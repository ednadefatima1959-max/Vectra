name: Vectra Smart Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install GCC
      run: sudo apt-get update && sudo apt-get install -y build-essential

    - name: Filtrar código útil
      run: |
        echo "Filtrando arquivos principais..."

        # pega só C fora de pastas problemáticas
        find . -name "*.c" \
          ! -path "./.git/*" \
          ! -path "./.github/*" \
          ! -path "./bug/*" \
          ! -path "./tools/*" \
          ! -path "./.ci/*" \
          > sources.txt

        cat sources.txt

    - name: Compilar (modo tolerante)
      run: |
        gcc -O2 -w -fcommon $(cat sources.txt) -o vectra_auto || true

    - name: Verificar
      run: |
        if [ -f vectra_auto ]; then
          echo "SUCESSO"
          ls -lh vectra_auto
        else
          echo "FALHOU"
        fi

    - name: Upload binário
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: vectra-bin
        path: vectra_auto
