name: Vectra Full Auto Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential

    - name: Find all C files
      run: |
        echo "Procurando arquivos .c..."
        find . -name "*.c" > sources.txt
        cat sources.txt

    - name: Compile (tentativa principal)
      run: |
        gcc -O2 -w -fcommon $(cat sources.txt) -o vectra_auto || true

    - name: Verificar binário
      run: |
        if [ -f vectra_auto ]; then
          echo "BINÁRIO GERADO ✔"
          ls -lh vectra_auto
        else
          echo "FALHOU ❌"
        fi

    - name: Rodar (se existir)
      run: |
        if [ -f vectra_auto ]; then
          ./vectra_auto || true
        fi

    - name: Salvar binário (download)
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: vectra-binary
        path: vectra_auto
