name: android-arm64-build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld

      - name: build ARM64 (Android ABI)
        run: |
          clang mrynli.c \
            -O3 \
            -target aarch64-linux-android21 \
            -static \
            -o mrynli_arm64

      - name: strip binary
        run: |
          llvm-strip mrynli_arm64 || strip mrynli_arm64

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mrynli-android-arm64
          path: mrynli_arm64
