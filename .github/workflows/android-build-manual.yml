name: android-build-manual

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Perfil de execução (mapeado a atrator do Exacordex)"
        required: true
        type: choice
        default: moderado
        options:
          - fast            # Atrator 0 – só validação mínima
          - moderado        # Atrator 7 – validações principais
          - profundo        # Atrator 21 – validações completas + testes
          - ultra_minucioso # Atrator 42 – tudo, inclusive fuzzing simbólico
          - interoperabilidade
          - confiabilidade
          - diagnostico
          - release_ready
          - hardware_focus
          - matrix_total
          - holistico
      build_debug:
        description: "Gerar APK debug"
        type: boolean
        default: true
      build_release:
        description: "Gerar APK release (não assinado a menos que sign_release=true)"
        type: boolean
        default: false
      sign_release:
        description: "Assinar release (requer segredos)"
        type: boolean
        default: false
      run_lint:
        description: "Executar lint"
        type: boolean
        default: true
      run_native_matrix:
        description: "Executar matriz nativa (checkNativeAllMatrix)"
        type: boolean
        default: true
      run_unit_tests:
        description: "Executar testes unitários"
        type: boolean
        default: false
      android_api:
        description: "Android API (compile/target)"
        type: string
        default: "35"
      build_tools:
        description: "Android Build Tools"
        type: string
        default: "35.0.0"
      ndk_version:
        description: "NDK version"
        type: string
        default: "27.2.12479018"
      cmake_version:
        description: "CMake version"
        type: string
        default: "3.22.1"
      java_version:
        description: "JDK version (17 ou 21)"
        type: string
        default: "17"
      gradle_module:
        description: "Módulo Gradle principal"
        type: string
        default: "app"
      gradle_extra_args:
        description: "Argumentos extras para Gradle"
        type: string
        default: ""

  workflow_call:
    inputs:
      mode:
        type: string
        default: moderado
      build_debug:
        type: boolean
        default: true
      build_release:
        type: boolean
        default: false
      sign_release:
        type: boolean
        default: false
      run_lint:
        type: boolean
        default: true
      run_native_matrix:
        type: boolean
        default: true
      run_unit_tests:
        type: boolean
        default: false
      android_api:
        type: string
        default: "35"
      build_tools:
        type: string
        default: "35.0.0"
      ndk_version:
        type: string
        default: "27.2.12479018"
      cmake_version:
        type: string
        default: "3.22.1"
      java_version:
        type: string
        default: "17"
      gradle_module:
        type: string
        default: "app"
      gradle_extra_args:
        type: string
        default: ""
    secrets:
      VECTRAS_RELEASE_KEYSTORE_B64:
        required: false
      VECTRAS_RELEASE_STORE_PASSWORD:
        required: false
      VECTRAS_RELEASE_KEY_ALIAS:
        required: false
      VECTRAS_RELEASE_KEY_PASSWORD:
        required: false

permissions:
  contents: read

jobs:
  android-build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      JAVA_VERSION: ${{ inputs.java_version || '17' }}
      COMPILE_API: ${{ inputs.android_api || '35' }}
      TARGET_API: ${{ inputs.android_api || '35' }}
      TOOLS_VERSION: ${{ inputs.build_tools || '35.0.0' }}
      NDK_VERSION: ${{ inputs.ndk_version || '27.2.12479018' }}
      CMAKE_VERSION: ${{ inputs.cmake_version || '3.22.1' }}
      MODE: ${{ inputs.mode || 'moderado' }}
      GRADLE_MODULE: ${{ inputs.gradle_module || 'app' }}
      GRADLE_EXTRA_ARGS: ${{ inputs.gradle_extra_args || '' }}
      # Força Node.js 24 nas ações que suportam (evita warning e falha futura)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout (Node 24 compatível)
        uses: actions/checkout@v4

      - name: Set up JDK (Node 24 compatível)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Android SDK (Node 24 compatível)
        uses: android-actions/setup-android@v3

      - name: Install Android packages (com retry e timeout)
        id: sdk_install
        run: |
          set -euo pipefail
          # Aceita licenças com retry (ruído de rede)
          for i in {1..3}; do
            yes | sdkmanager --licenses >/dev/null && break || sleep 5
          done
          # Instala componentes; se falhar, tenta novamente (estado retry)
          for pkg in "platform-tools" "platforms;android-${COMPILE_API}" "build-tools;${TOOLS_VERSION}" "cmake;${CMAKE_VERSION}" "ndk;${NDK_VERSION}"; do
            for i in {1..3}; do
              if sdkmanager "$pkg"; then break; else
                echo "Falha ao instalar $pkg, tentativa $i/3 – estado retry"
                sleep 5
              fi
            done
          done
          # Verifica presença (validação pós-instalação)
          test -d "${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}"
          test -d "${ANDROID_SDK_ROOT}/cmake/${CMAKE_VERSION}"

      - name: Configure mode profile (mapeamento para atratores)
        id: mode
        run: |
          set -euo pipefail
          case "${MODE}" in
            fast)
              echo "strict=false" >> "$GITHUB_OUTPUT"
              echo "matrix_cmd=checkNativeAllMatrix -PbuildStrict=false" >> "$GITHUB_OUTPUT"
              echo "repo_checks=false" >> "$GITHUB_OUTPUT"
              echo "gradle_tasks=verifyGradleRuntimeJvm :${GRADLE_MODULE}:assembleDebug" >> "$GITHUB_OUTPUT"
              ;;
            moderado)
              echo "strict=false" >> "$GITHUB_OUTPUT"
              echo "matrix_cmd=checkNativeAllMatrix -PbuildStrict=false" >> "$GITHUB_OUTPUT"
              echo "repo_checks=true" >> "$GITHUB_OUTPUT"
              echo "gradle_tasks=verifyGradleRuntimeJvm verifyTargetApiBaseline verifyMinApiAbiCompatibility verifyArm64ToolchainCompatibility verifyBootstrapAssets lintDebug :${GRADLE_MODULE}:assembleDebug" >> "$GITHUB_OUTPUT"
              ;;
            profundo|ultra_minucioso|interoperabilidade|confiabilidade|diagnostico|release_ready|hardware_focus|matrix_total|holistico)
              echo "strict=true" >> "$GITHUB_OUTPUT"
              echo "matrix_cmd=checkNativeAllMatrix -PbuildStrict=true" >> "$GITHUB_OUTPUT"
              echo "repo_checks=true" >> "$GITHUB_OUTPUT"
              echo "gradle_tasks=verifyGradleRuntimeJvm verifyTargetApiBaseline verifyMinApiAbiCompatibility verifyArm64ToolchainCompatibility verifyBootstrapAssets verifyRepoFileDependencies checkNativeAllMatrix lintDebug testDebugUnitTest connectedDebugAndroidTest :${GRADLE_MODULE}:assembleDebug" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Modo inválido: ${MODE}" >&2
              exit 1
              ;;
          esac

      - name: Validate Android and native toolchain dependencies
        run: |
          set -euo pipefail
          required_tools=(java javac sdkmanager cmake ninja make python3)
          for tool in "${required_tools[@]}"; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "Missing required tool: $tool" >&2
              exit 1
            fi
            echo "OK: $tool -> $(command -v "$tool")"
          done

      - name: Build local.properties
        run: echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties

      - name: Decode release keystore (se necessário)
        if: inputs.build_release && inputs.sign_release
        env:
          VECTRAS_RELEASE_KEYSTORE_B64: ${{ secrets.VECTRAS_RELEASE_KEYSTORE_B64 }}
        run: |
          set -euo pipefail
          if [[ -z "${VECTRAS_RELEASE_KEYSTORE_B64:-}" ]]; then
            echo "Assinatura solicitada, mas keystore não fornecido." >&2
            exit 1
          fi
          echo "$VECTRAS_RELEASE_KEYSTORE_B64" | base64 -d > vectras-release.jks

      - name: Run baseline Gradle tasks
        run: |
          set -euo pipefail
          chmod +x gradlew
          TASKS="${{ steps.mode.outputs.gradle_tasks }}"
          if [[ -z "${TASKS// }" ]]; then
            TASKS="verifyGradleRuntimeJvm verifyTargetApiBaseline verifyMinApiAbiCompatibility verifyArm64ToolchainCompatibility verifyBootstrapAssets verifyRepoFileDependencies"
          fi
          ./gradlew --no-daemon --stacktrace ${TASKS} ${GRADLE_EXTRA_ARGS}

      - name: Build Debug APK
        if: inputs.build_debug
        run: |
          set -euo pipefail
          tasks=()
          if [[ "${{ inputs.run_lint }}" == 'true' ]]; then
            tasks+=("lintDebug")
          fi
          if [[ "${{ inputs.run_unit_tests }}" == 'true' ]]; then
            tasks+=("testDebugUnitTest")
          fi
          tasks+=(":${GRADLE_MODULE}:assembleDebug")
          ./gradlew --no-daemon --stacktrace "${tasks[@]}" -PcheckVariant=debug ${GRADLE_EXTRA_ARGS}

      - name: Build Release APK (unsigned)
        if: inputs.build_release && ! inputs.sign_release
        run: |
          ./gradlew --no-daemon --stacktrace ":${GRADLE_MODULE}:assembleRelease" ${GRADLE_EXTRA_ARGS}

      - name: Build and Sign Release APK
        if: inputs.build_release && inputs.sign_release
        env:
          VECTRAS_RELEASE_STORE_PASSWORD: ${{ secrets.VECTRAS_RELEASE_STORE_PASSWORD }}
          VECTRAS_RELEASE_KEY_ALIAS: ${{ secrets.VECTRAS_RELEASE_KEY_ALIAS }}
          VECTRAS_RELEASE_KEY_PASSWORD: ${{ secrets.VECTRAS_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${VECTRAS_RELEASE_STORE_PASSWORD}" || -z "${VECTRAS_RELEASE_KEY_ALIAS}" || -z "${VECTRAS_RELEASE_KEY_PASSWORD}" ]]; then
            echo "Assinatura solicitada, mas faltam segredos." >&2
            exit 1
          fi
          mkdir -p .ci-keystore
          # O keystore já foi decodificado no passo anterior
          mv vectras-release.jks .ci-keystore/release.jks
          ./gradlew --no-daemon --stacktrace \
            -PVECTRAS_RELEASE_STORE_FILE=.ci-keystore/release.jks \
            -PVECTRAS_RELEASE_STORE_PASSWORD="${VECTRAS_RELEASE_STORE_PASSWORD}" \
            -PVECTRAS_RELEASE_KEY_ALIAS="${VECTRAS_RELEASE_KEY_ALIAS}" \
            -PVECTRAS_RELEASE_KEY_PASSWORD="${VECTRAS_RELEASE_KEY_PASSWORD}" \
            ":${GRADLE_MODULE}:assembleRelease" ${GRADLE_EXTRA_ARGS}

      - name: Cleanup signing material
        if: always()
        run: rm -rf .ci-keystore

      - name: Run native matrix (checkNativeAllMatrix)
        if: inputs.run_native_matrix
        run: |
          ./gradlew --no-daemon --stacktrace ${{ steps.mode.outputs.matrix_cmd }} ${GRADLE_EXTRA_ARGS}

      - name: Generate diagnostics summary (espelho da execução)
        if: always()
        run: |
          {
            echo "## Android Build Diagnostics – Exacordex Atrator ${MODE}"
            echo ""
            echo "| Propriedade | Valor |"
            echo "|------------|-------|"
            echo "| Modo (atrator) | ${MODE} |"
            echo "| Strict mode | ${{ steps.mode.outputs.strict }} |"
            echo "| Repo checks | ${{ steps.mode.outputs.repo_checks }} |"
            echo "| Módulo | ${GRADLE_MODULE} |"
            echo "| Build debug | ${{ inputs.build_debug }} |"
            echo "| Build release | ${{ inputs.build_release }} |"
            echo "| Sign release | ${{ inputs.sign_release }} |"
            echo "| Lint | ${{ inputs.run_lint }} |"
            echo "| Unit tests | ${{ inputs.run_unit_tests }} |"
            echo "| Native matrix | ${{ inputs.run_native_matrix }} |"
            echo "| API | ${COMPILE_API} |"
            echo "| Build Tools | ${TOOLS_VERSION} |"
            echo "| NDK | ${NDK_VERSION} |"
            echo "| CMake | ${CMAKE_VERSION} |"
            echo "| Java | ${JAVA_VERSION} |"
            echo ""
            echo "_Ruído observado (warnings/deprecações) – se houver, foi registrado como entropia._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload APK and diagnostic artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-manual-artifacts-${{ github.run_number }}
          path: |
            ${{ env.GRADLE_MODULE }}/build/outputs/**/*.apk
            **/build/reports/**
            **/build/test-results/**
            **/*.log
          if-no-files-found: warn
          
