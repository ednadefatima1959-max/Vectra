name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      build_debug:
        description: 'Build Debug APK'
        type: boolean
        default: true
      build_release:
        description: 'Build Release APK'
        type: boolean
        default: false
      sign_release:
        description: 'Sign Release APK (requires secrets)'
        type: boolean
        default: false
      upload_telegram:
        description: 'Upload to Telegram'
        type: boolean
        default: false
      compile_api:
        description: 'Compile SDK API'
        type: string
        default: '35'
      tools_version:
        description: 'Build Tools Version'
        type: string
        default: '35.0.0'
      ndk_version:
        description: 'NDK Version'
        type: string
        default: '27.2.12479018'
      cmake_version:
        description: 'CMake Version'
        type: string
        default: '3.22.1'
      java_version:
        description: 'Java Version'
        type: string
        default: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      COMPILE_API: ${{ inputs.compile_api || '35' }}
      TOOLS_VERSION: ${{ inputs.tools_version || '35.0.0' }}
      NDK_VERSION: ${{ inputs.ndk_version || '27.2.12479018' }}
      CMAKE_VERSION: ${{ inputs.cmake_version || '3.22.1' }}
      JAVA_VERSION: ${{ inputs.java_version || '17' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "tools platform-tools"
          cmdline-tools-version: 12266719
          accept-android-sdk-licenses: true

      - name: Install NDK and CMake
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;${{ env.NDK_VERSION }}" "cmake;${{ env.CMAKE_VERSION }}"
          echo "NDK installed at $ANDROID_HOME/ndk/${{ env.NDK_VERSION }}"
          echo "CMake installed at $ANDROID_HOME/cmake/${{ env.CMAKE_VERSION }}"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew tools/gradle_with_jdk21.sh

      - name: Verify Android SDK packages
        run: ./tools/gradle_with_jdk21.sh verifyAndroidSdkPackages

      - name: Build Debug APK
        if: inputs.build_debug != false
        run: ./tools/gradle_with_jdk21.sh assembleDebug

      - name: Build Release APK (unsigned)
        if: inputs.build_release == true && inputs.sign_release != true
        run: ./tools/gradle_with_jdk21.sh assembleRelease

      - name: Build Release APK (signed)
        if: inputs.build_release == true && inputs.sign_release == true
        env:
          VECTRAS_RELEASE_STORE_FILE: ${{ secrets.VECTRAS_RELEASE_STORE_FILE }}
          VECTRAS_RELEASE_STORE_PASSWORD: ${{ secrets.VECTRAS_RELEASE_STORE_PASSWORD }}
          VECTRAS_RELEASE_KEY_ALIAS: ${{ secrets.VECTRAS_RELEASE_KEY_ALIAS }}
          VECTRAS_RELEASE_KEY_PASSWORD: ${{ secrets.VECTRAS_RELEASE_KEY_PASSWORD }}
        run: |
          echo "storeFile=$VECTRAS_RELEASE_STORE_FILE" > keystore.properties
          echo "storePassword=$VECTRAS_RELEASE_STORE_PASSWORD" >> keystore.properties
          echo "keyAlias=$VECTRAS_RELEASE_KEY_ALIAS" >> keystore.properties
          echo "keyPassword=$VECTRAS_RELEASE_KEY_PASSWORD" >> keystore.properties
          ./tools/gradle_with_jdk21.sh assembleRelease

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: apks
          path: app/build/outputs/apk/*/*.apk

      - name: Notify Telegram (if enabled)
        if: inputs.upload_telegram == true
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            Build finished: ${{ github.repository }}
            Commit: ${{ github.sha }}
            Artifacts uploaded.
