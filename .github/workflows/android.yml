name: Android CI

on:
  workflow_dispatch:
    inputs:
      build_debug:
        description: "Gerar APK debug"
        type: boolean
        default: true
      build_release:
        description: "Gerar APK release"
        type: boolean
        default: false
      sign_release:
        description: "Assinar release com secrets"
        type: boolean
        default: false
      compile_api:
        description: "Android compileSdk / targetSdk"
        type: string
        default: "35"
      tools_version:
        description: "Android Build Tools"
        type: string
        default: "35.0.0"
      ndk_version:
        description: "Android NDK version"
        type: string
        default: "27.2.12479018"
      cmake_version:
        description: "Android CMake version"
        type: string
        default: "3.22.1"
      java_version:
        description: "JDK version"
        type: string
        default: "17"
      upload_telegram:
        description: "Notificar Telegram"
        type: boolean
        default: false
  workflow_call:
    inputs:
      build_debug:
        type: boolean
        default: true
      build_release:
        type: boolean
        default: false
      sign_release:
        type: boolean
        default: false
      compile_api:
        type: string
        default: "35"
      tools_version:
        type: string
        default: "35.0.0"
      ndk_version:
        type: string
        default: "27.2.12479018"
      cmake_version:
        type: string
        default: "3.22.1"
      java_version:
        type: string
        default: "17"
      upload_telegram:
        type: boolean
        default: false
    secrets:
      VECTRAS_RELEASE_STORE_FILE:
        required: false
      VECTRAS_RELEASE_STORE_PASSWORD:
        required: false
      VECTRAS_RELEASE_KEY_ALIAS:
        required: false
      VECTRAS_RELEASE_KEY_PASSWORD:
        required: false
      TELEGRAM_TO:
        required: false
      TELEGRAM_TOKEN:
        required: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      COMPILE_API: ${{ inputs.compile_api || '35' }}
      TOOLS_VERSION: ${{ inputs.tools_version || '35.0.0' }}
      NDK_VERSION: ${{ inputs.ndk_version || '27.2.12479018' }}
      CMAKE_VERSION: ${{ inputs.cmake_version || '3.22.1' }}
      JAVA_VERSION: ${{ inputs.java_version || '17' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "platforms;android-${COMPILE_API}" \
            "build-tools;${TOOLS_VERSION}" \
            "ndk;${NDK_VERSION}" \
            "cmake;${CMAKE_VERSION}"
          echo "NDK installed at ${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}"
          echo "CMake installed at ${ANDROID_SDK_ROOT}/cmake/${CMAKE_VERSION}"

      - name: Build local.properties
        run: echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew tools/gradle_with_jdk21.sh

      - name: Verify Android SDK packages
        run: ./tools/gradle_with_jdk21.sh verifyAndroidSdkPackages

      - name: Build Debug APK
        if: inputs.build_debug != false
        run: ./tools/gradle_with_jdk21.sh assembleDebug

      - name: Build Release APK (unsigned)
        if: inputs.build_release == true && inputs.sign_release != true
        run: ./tools/gradle_with_jdk21.sh assembleRelease

      - name: Build Release APK (signed)
        if: inputs.build_release == true && inputs.sign_release == true
        env:
          VECTRAS_RELEASE_STORE_FILE: ${{ secrets.VECTRAS_RELEASE_STORE_FILE }}
          VECTRAS_RELEASE_STORE_PASSWORD: ${{ secrets.VECTRAS_RELEASE_STORE_PASSWORD }}
          VECTRAS_RELEASE_KEY_ALIAS: ${{ secrets.VECTRAS_RELEASE_KEY_ALIAS }}
          VECTRAS_RELEASE_KEY_PASSWORD: ${{ secrets.VECTRAS_RELEASE_KEY_PASSWORD }}
        run: |
          echo "storeFile=$VECTRAS_RELEASE_STORE_FILE" > keystore.properties
          echo "storePassword=$VECTRAS_RELEASE_STORE_PASSWORD" >> keystore.properties
          echo "keyAlias=$VECTRAS_RELEASE_KEY_ALIAS" >> keystore.properties
          echo "keyPassword=$VECTRAS_RELEASE_KEY_PASSWORD" >> keystore.properties
          ./tools/gradle_with_jdk21.sh assembleRelease

      - name: Upload APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-apks-${{ github.run_id }}
          path: |
            app/build/outputs/apk/*/*.apk
            app/build/outputs/**/*.apk
            app/build/reports/**
            **/build/outputs/logs/**
          if-no-files-found: warn

      - name: Notify Telegram (if enabled)
        if: inputs.upload_telegram == true
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            Build finished: ${{ github.repository }}
            Commit: ${{ github.sha }}
            Artifacts uploaded.
