name: Android CI (No-Gap Adaptive)

on:
  workflow_dispatch:
    inputs:
      build_debug:
        description: "Gerar APK debug"
        type: boolean
        default: true
      build_release:
        description: "Gerar APK release"
        type: boolean
        default: false
      sign_release:
        description: "Assinar release com secrets"
        type: boolean
        default: false
      auto_fix_resources:
        description: "Auto corrigir strings.xml"
        type: boolean
        default: true
      enable_fallback:
        description: "Ativar fallback"
        type: boolean
        default: true
      compile_api:
        description: "Android compileSdk"
        type: string
        default: "35"
      tools_version:
        description: "Build Tools"
        type: string
        default: "35.0.0"
      ndk_version:
        description: "NDK"
        type: string
        default: "27.2.12479018"
      cmake_version:
        description: "CMake"
        type: string
        default: "3.22.1"
      java_version:
        description: "JDK"
        type: string
        default: "17"
      upload_telegram:
        description: "Notificar Telegram"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    env:
      COMPILE_API: ${{ inputs.compile_api }}
      TOOLS_VERSION: ${{ inputs.tools_version }}
      NDK_VERSION: ${{ inputs.ndk_version }}
      CMAKE_VERSION: ${{ inputs.cmake_version }}
      JAVA_VERSION: ${{ inputs.java_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK/NDK/CMake
        run: |
          set -e
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "platforms;android-${COMPILE_API}" \
            "build-tools;${TOOLS_VERSION}" \
            "ndk;${NDK_VERSION}" \
            "cmake;${CMAKE_VERSION}"

      # 🔧 FECHAMENTO DE GAP (strings.xml)
      - name: Auto-fix resources
        if: inputs.auto_fix_resources == true
        run: |
          BASE=app/src/main/res/values
          FILE=$BASE/strings.xml

          mkdir -p $BASE

          if [ ! -f "$FILE" ]; then
            echo "Criando strings.xml base"
            cat <<EOF > $FILE
<resources>
    <string name="app_name">Vectra</string>
    <string name="common_ok">OK</string>
    <string name="common_cancel">Cancel</string>
    <string name="common_yes">Yes</string>
    <string name="common_no">No</string>
</resources>
EOF
          fi

      - name: local.properties
        run: echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties

      - name: chmod gradle
        run: chmod +x gradlew tools/gradle_with_jdk21.sh

      # 🧠 BUILD COM CAPTURA (Δ)
      - name: Build Debug
        id: build_debug
        if: inputs.build_debug == true
        continue-on-error: true
        run: |
          ./tools/gradle_with_jdk21.sh assembleDebug | tee build.log

      - name: Build Release
        id: build_release
        if: inputs.build_release == true && inputs.sign_release != true
        continue-on-error: true
        run: |
          ./tools/gradle_with_jdk21.sh assembleRelease | tee -a build.log

      - name: Build Release Signed
        if: inputs.build_release == true && inputs.sign_release == true
        continue-on-error: true
        env:
          VECTRAS_RELEASE_STORE_FILE: ${{ secrets.VECTRAS_RELEASE_STORE_FILE }}
          VECTRAS_RELEASE_STORE_PASSWORD: ${{ secrets.VECTRAS_RELEASE_STORE_PASSWORD }}
          VECTRAS_RELEASE_KEY_ALIAS: ${{ secrets.VECTRAS_RELEASE_KEY_ALIAS }}
          VECTRAS_RELEASE_KEY_PASSWORD: ${{ secrets.VECTRAS_RELEASE_KEY_PASSWORD }}
        run: |
          echo "storeFile=$VECTRAS_RELEASE_STORE_FILE" > keystore.properties
          echo "storePassword=$VECTRAS_RELEASE_STORE_PASSWORD" >> keystore.properties
          echo "keyAlias=$VECTRAS_RELEASE_KEY_ALIAS" >> keystore.properties
          echo "keyPassword=$VECTRAS_RELEASE_KEY_PASSWORD" >> keystore.properties
          ./tools/gradle_with_jdk21.sh assembleRelease | tee -a build.log

      # 🔍 DETECÇÃO DE ERRO
      - name: Detect errors
        id: detect
        run: |
          if grep -i "error" build.log; then
            echo "has_error=true" >> $GITHUB_OUTPUT
          else
            echo "has_error=false" >> $GITHUB_OUTPUT
          fi

      # 🔁 FALLBACK
      - name: Fallback recovery
        if: steps.detect.outputs.has_error == 'true' && inputs.enable_fallback == true
        run: |
          echo "Ativando fallback..."
          ./gradlew clean
          rm -rf app/build
          ./tools/gradle_with_jdk21.sh assembleDebug --stacktrace --no-daemon

      # 📦 Upload sempre
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-apks-${{ github.run_id }}
          path: |
            app/build/outputs/**/*.apk
            build.log
            **/build/reports/**
          if-no-files-found: warn

      - name: Notify Telegram
        if: inputs.upload_telegram == true
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🚀 Build finalizado
            Repo: ${{ github.repository }}
            Commit: ${{ github.sha }}
