name: Android CI (Vectra Adaptive No-Gap)

on:
  workflow_dispatch:
    inputs:
      build_debug:
        type: boolean
        default: true
      build_release:
        type: boolean
        default: false
      sign_release:
        type: boolean
        default: false
      auto_fix_resources:
        description: "Auto corrigir resources (strings.xml)"
        type: boolean
        default: true
      enable_fallback:
        description: "Ativar fallback inteligente"
        type: boolean
        default: true
      compile_api:
        type: string
        default: "35"
      tools_version:
        type: string
        default: "35.0.0"
      ndk_version:
        type: string
        default: "27.2.12479018"
      cmake_version:
        type: string
        default: "3.22.1"
      java_version:
        type: string
        default: "17"
      upload_telegram:
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    env:
      COMPILE_API: ${{ inputs.compile_api }}
      TOOLS_VERSION: ${{ inputs.tools_version }}
      NDK_VERSION: ${{ inputs.ndk_version }}
      CMAKE_VERSION: ${{ inputs.cmake_version }}
      JAVA_VERSION: ${{ inputs.java_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android
        uses: android-actions/setup-android@v3

      - name: Install SDK/NDK/CMake
        run: |
          set -e
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "platforms;android-${COMPILE_API}" \
            "build-tools;${TOOLS_VERSION}" \
            "ndk;${NDK_VERSION}" \
            "cmake;${CMAKE_VERSION}"

      # 🧠 FECHAMENTO DE GAP (CRÍTICO)
      - name: Auto-fix resources (no-gap)
        if: inputs.auto_fix_resources == true
        run: |
          BASE=app/src/main/res/values
          FILE=$BASE/strings.xml

          mkdir -p $BASE

          if [ ! -f "$FILE" ]; then
            echo "🔧 Criando base strings.xml"
            cat <<EOF > $FILE
<resources>
    <string name="app_name">Vectra</string>
    <string name="common_ok">OK</string>
    <string name="common_cancel">Cancel</string>
    <string name="common_yes">Yes</string>
    <string name="common_no">No</string>
</resources>
EOF
          fi

      - name: local.properties
        run: echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties

      - name: chmod gradle
        run: chmod +x gradlew tools/gradle_with_jdk21.sh

      # 🧠 BUILD COM CAPTURA DE ERRO (Δ)
      - name: Build Debug (primary)
        id: build_debug
        if: inputs.build_debug == true
        continue-on-error: true
        run: |
          ./tools/gradle_with_jdk21.sh assembleDebug | tee build.log

      - name: Build Release (primary)
        id: build_release
        if: inputs.build_release == true
        continue-on-error: true
        run: |
          ./tools/gradle_with_jdk21.sh assembleRelease | tee build.log

      # 🔍 DETECTOR DE Δ (ERRO)
      - name: Detect errors
        id: detect
        run: |
          if grep -i "error" build.log; then
            echo "has_error=true" >> $GITHUB_OUTPUT
          else
            echo "has_error=false" >> $GITHUB_OUTPUT
          fi

      # 🔁 FALLBACK INTELIGENTE
      - name: Fallback recovery
        if: steps.detect.outputs.has_error == 'true' && inputs.enable_fallback == true
        run: |
          echo "⚠️ Ativando fallback..."

          ./gradlew clean
          rm -rf app/build

          # tentativa mais segura
          ./tools/gradle_with_jdk21.sh assembleDebug --stacktrace --no-daemon

      # 📦 Upload sempre (mesmo com erro)
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vectra-build-${{ github.run_id }}
          path: |
            app/build/outputs/**/*.apk
            build.log
            **/build/reports/**
          if-no-files-found: warn

      - name: Telegram
        if: inputs.upload_telegram == true
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🚀 VECTRA BUILD FINALIZADO
            Repo: ${{ github.repository }}
            Commit: ${{ github.sha }}
