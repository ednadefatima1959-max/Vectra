# ============================================================
# build-apk.yml — Vectra APK Build
# Autor: ∆RafaelVerboΩ / Instituto Rafael
# Dispara: push em main/master + botão manual
# Produto: Debug APK em Actions → Artifacts
# Validado: sem [[ sem shell, sem @v3, sem lógica quebrada
# ============================================================

name: Build APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'app/**'
      - 'engine/**'
      - 'terminal-emulator/**'
      - 'terminal-view/**'
      - 'shell-loader/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'gradle/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION:    '17'
  COMPILE_API:     '35'
  TARGET_API:      '35'
  MIN_API:         '23'
  TOOLS_VERSION:   '35.0.0'
  NDK_VERSION:     '27.2.12479018'
  CMAKE_VERSION:   '3.22.1'

jobs:
  build-debug:
    name: Debug APK (arm64)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ----------------------------------------------------------
      # 1. Checkout
      # ----------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------------------------------------
      # 2. Java — Temurin 17 (padrão do projeto)
      # ----------------------------------------------------------
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      # ----------------------------------------------------------
      # 3. Android SDK
      # ----------------------------------------------------------
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        shell: bash
        run: |
          set -euo pipefail
          tmp="$(mktemp)"
          trap 'rm -f "$tmp"' EXIT
          # Gera 200 confirmações 'y' sem loop interativo
          python3 -c "print('y\n'*200)" > "$tmp"
          sdkmanager --licenses < "$tmp" > /dev/null 2>&1 || true

      - name: Install SDK packages
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager \
            "platform-tools" \
            "platforms;android-${COMPILE_API}" \
            "build-tools;${TOOLS_VERSION}" \
            "cmake;${CMAKE_VERSION}" \
            "ndk;${NDK_VERSION}"

      # ----------------------------------------------------------
      # 4. Configuração local
      # ----------------------------------------------------------
      - name: Generate local.properties
        shell: bash
        run: echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties

      - name: Materialize Firebase placeholder (debug)
        shell: bash
        env:
          VECTRAS_GOOGLE_SERVICES_JSON_B64: ${{ secrets.VECTRAS_GOOGLE_SERVICES_JSON_B64 }}
        run: |
          set -euo pipefail
          if [ -f "tools/ci/materialize_google_services_placeholder.sh" ]; then
            bash tools/ci/materialize_google_services_placeholder.sh
          else
            echo "[skip] materialize_google_services_placeholder.sh não encontrado"
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ----------------------------------------------------------
      # 5. Build APK debug
      # ----------------------------------------------------------
      - name: Build Debug APK
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew --no-daemon --stacktrace \
            :app:assembleDebug \
            -PbuildStrict=false \
            -PcheckVariant=debug \
            -PAPP_ABI_POLICY=arm64-only \
            -Pcompile.api="${COMPILE_API}" \
            -Ptarget.api="${TARGET_API}" \
            -Pmin.api="${MIN_API}" \
            -Ptools.version="${TOOLS_VERSION}" \
            -Pndk.version="${NDK_VERSION}" \
            -Pcmake.version="${CMAKE_VERSION}" \
            -Pjava.language.version="${JAVA_VERSION}"

      # ----------------------------------------------------------
      # 6. Verificar que o .so foi compilado (invariante do build)
      # ----------------------------------------------------------
      - name: Verify native library present
        shell: bash
        run: |
          set -euo pipefail
          SO=$(find app/build -name "libvectra_core_accel.so" 2>/dev/null | head -1)
          if [ -z "$SO" ]; then
            echo "::error::libvectra_core_accel.so não encontrado — NDK/CMake falhou"
            exit 1
          fi
          echo "Native library OK: $SO"
          file "$SO"

      # ----------------------------------------------------------
      # 7. Upload — APK fica disponível em Actions → Artifacts
      # ----------------------------------------------------------
      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vectras-debug-apk-${{ github.run_number }}
          retention-days: 30
          if-no-files-found: warn
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/**/*.apk
            app/build/reports/**
            app/build/outputs/logs/**
