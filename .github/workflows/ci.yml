name: vectras-ci

on:
  push:
    paths:
      - 'engine/**'
      - 'demo_cli/**'
      - 'bench/**'
      - 'tools/**'
      - 'CMakeLists.txt'
      - 'Makefile'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'engine/**'
      - 'demo_cli/**'
      - 'bench/**'
      - 'tools/**'
      - 'CMakeLists.txt'
      - 'Makefile'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  host-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block duplicated overlay ZIP source
        run: bash tools/check_overlay_zip_duplicates.sh

      - name: Block firebasestorage links in web assets
        run: bash tools/check_no_firebasestorage_links.sh

      - name: Validate docs reference commit consistency
        run: bash tools/check_docs_reference_commit.sh

      - name: Install host build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential cmake ninja-build make pkg-config python3 graphviz ripgrep

      - name: Validate native toolchain dependencies
        run: |
          set -euo pipefail
          required_tools=(cc gcc as ld ar nm make cmake ninja python3 dot rg)
          for tool in "${required_tools[@]}"; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "Missing required tool: $tool" >&2
              exit 1
            fi
            echo "OK: $tool -> $(command -v "$tool")"
          done

      - name: Show hosted engine config
        run: make print-build-config

      - name: Export Make resolved build config
        run: make print-build-config-env

      - name: Build engine with Makefile
        run: make -j"$(nproc)"

      - name: Run engine selftests
        run: |
          set -euo pipefail
          mkdir -p bench/results
          make run-selftest 2>&1 | tee bench/results/host-selftest.log


      - name: Build engine with root CMake
        run: |
          cmake -S . -B build-cmake -G Ninja -DRMR_JNI_BUILD=ON -DRMR_ENABLE_POLICY_MODULE=ON
          cmake --build build-cmake -j"$(nproc)"

      - name: Verify link contracts (CMake)
        run: cmake --build build-cmake --target verify_contracts

      - name: Run engine selftests (CMake)
        run: cmake --build build-cmake --target run_selftest

      - name: Materializar diretório de artefatos compilados
        shell: bash
        run: |
          set -euo pipefail
          ARTIFACT_DIR="artifacts/host-engine"
          rm -rf "${ARTIFACT_DIR}"
          mkdir -p "${ARTIFACT_DIR}/make/lib" "${ARTIFACT_DIR}/make/bin" "${ARTIFACT_DIR}/cmake/lib" "${ARTIFACT_DIR}/cmake/bin" "${ARTIFACT_DIR}/logs"

          # Make outputs
          cp -v build/engine/librmr.a "${ARTIFACT_DIR}/make/lib/"
          cp -v build/engine/libbitraf.a "${ARTIFACT_DIR}/make/lib/"
          cp -v build/demo/rafaelia_demo "${ARTIFACT_DIR}/make/bin/"
          cp -v build/demo/bitomega_smoketest "${ARTIFACT_DIR}/make/bin/"
          cp -v build/bench/rmr_bench "${ARTIFACT_DIR}/make/bin/"

          # CMake outputs
          cp -v build-cmake/librmr.a "${ARTIFACT_DIR}/cmake/lib/"
          cp -v build-cmake/libbitraf.a "${ARTIFACT_DIR}/cmake/lib/"
          cp -v build-cmake/rafaelia_demo "${ARTIFACT_DIR}/cmake/bin/"
          cp -v build-cmake/bitomega_smoketest "${ARTIFACT_DIR}/cmake/bin/"
          cp -v build-cmake/rmr_bench "${ARTIFACT_DIR}/cmake/bin/"

          # Logs and reports
          if [ -d bench/results ]; then
            cp -av bench/results "${ARTIFACT_DIR}/logs/bench-results"
          fi
          if [ -d reports ]; then
            cp -av reports "${ARTIFACT_DIR}/logs/reports"
          fi

          test -f "${ARTIFACT_DIR}/make/lib/librmr.a"
          test -f "${ARTIFACT_DIR}/cmake/lib/librmr.a"
          test -f "${ARTIFACT_DIR}/make/bin/bitomega_smoketest"
          test -f "${ARTIFACT_DIR}/cmake/bin/bitomega_smoketest"

      - name: Upload host logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: host-engine-compiled-${{ github.run_id }}
          path: artifacts/host-engine
          if-no-files-found: error
