# engine-ci.yml
# CORREÇÕES APLICADAS:
#   B05 — approval-gate: adicionado shell: bash no step (usa [[)
#   B06 — engine-selftest-arm64: adicionado upload-artifact
#   Validado: Q16 invariants, manifest check, minimal/qa profiles
#
# Autor: ∆RafaelVerboΩ / Instituto Rafael

name: Engine CI

on:
  push:
    paths:
      - 'engine/**'
      - 'demo_cli/**'
      - 'CMakeLists.txt'
      - 'Makefile'
      - 'engine/rmr/sources.cmake'
      - 'engine/rmr/sources.mk'
      - 'tools/sync_engine_sources.py'
      - '.github/workflows/engine-ci.yml'
      - '.github/workflows/reusable-*.yml'
  pull_request:
    paths:
      - 'engine/**'
      - 'demo_cli/**'
      - 'CMakeLists.txt'
      - 'Makefile'
      - 'engine/rmr/sources.cmake'
      - 'engine/rmr/sources.mk'
      - 'tools/sync_engine_sources.py'
      - '.github/workflows/engine-ci.yml'
      - '.github/workflows/reusable-*.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: engine-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  minimal-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake make ninja-build pkg-config python3 ripgrep

      - name: Check engine source manifest alignment
        run: make check-engine-source-manifest

      - name: Validate Q16 invariants
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "tools/invariant_golden.txt" ]; then
            echo "[skip] tools/invariant_golden.txt não encontrado — pulando validação"
            exit 0
          fi
          grep -E "SPIRAL_Q16|PI_SIN_279_Q16|ALPHA_Q16" \
            engine/rmr/include/rafaelia_formulas_core.h \
            | awk '{print $3}' | sort > /tmp/invariants.current
          diff -u tools/invariant_golden.txt /tmp/invariants.current

      - name: Configure + build CMake minimal profile
        run: |
          cmake -S . -B build-cmake-minimal -G Ninja -DRMR_PROFILE=minimal
          cmake --build build-cmake-minimal -j"$(nproc)"
          cmake --build build-cmake-minimal --target verify_contracts

      - name: Assert QA-only targets absent in minimal profile
        shell: bash
        run: |
          set -euo pipefail
          if ninja -C build-cmake-minimal -t targets all \
              | rg -n "run_selftest|bitomega_transition_graph|run_release_gate|rmr_bench"; then
            echo "QA-only targets found in minimal profile." >&2
            exit 1
          fi
          echo "OK: minimal profile excludes benchmark/selftest/graph targets."

  qa-full:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]
        compiler: [gcc, clang]
    uses: ./.github/workflows/reusable-selftests.yml
    with:
      os: ${{ matrix.os }}
      compiler: ${{ matrix.compiler }}
      cmake_profile: qa

  # ------------------------------------------------------------------
  # FIX B05: adicionado shell: bash — [[ é bashism, sh não reconhece
  # ------------------------------------------------------------------
  approval-gate:
    name: approval-gate
    runs-on: ubuntu-latest
    needs: [minimal-fast, qa-full]
    if: always()
    steps:
      - name: Enforce approval criteria
        shell: bash
        run: |
          echo "Approval criteria:"
          echo "  1) minimal-fast: ${{ needs.minimal-fast.result }}"
          echo "  2) qa-full:      ${{ needs.qa-full.result }}"
          [[ "${{ needs.minimal-fast.result }}" == "success" ]] || {
            echo "::error::minimal-fast não passou"
            exit 1
          }
          [[ "${{ needs.qa-full.result }}" == "success" ]] || {
            echo "::error::qa-full não passou"
            exit 1
          }
          echo "Gate aprovado."

  # ------------------------------------------------------------------
  # FIX B06: adicionado upload-artifact para logs ARM64
  # ------------------------------------------------------------------
  engine-selftest-arm64:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake make ninja-build pkg-config python3 graphviz ripgrep

      - name: Build engine (Make)
        run: make clean && make -j"$(nproc)"

      - name: Run canonical selftest gate (Make)
        run: |
          set -euo pipefail
          mkdir -p bench/results
          make run-selftest 2>&1 | tee bench/results/selftest-host-arm64.log

      - name: Upload arm64 selftest logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selftest-logs-arm64-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: warn
          path: bench/results/selftest-host-arm64.log
