name: Engine CI

on:
  push:
    paths:
      - 'engine/**'
      - 'demo_cli/**'
      - 'CMakeLists.txt'
      - 'Makefile'
      - 'engine/rmr/sources.cmake'
      - 'engine/rmr/sources.mk'
      - 'tools/sync_engine_sources.py'
      - '.github/workflows/engine-ci.yml'
      - '.github/workflows/reusable-*.yml'
  pull_request:
    paths:
      - 'engine/**'
      - 'demo_cli/**'
      - 'CMakeLists.txt'
      - 'Makefile'
      - 'engine/rmr/sources.cmake'
      - 'engine/rmr/sources.mk'
      - 'tools/sync_engine_sources.py'
      - '.github/workflows/engine-ci.yml'
      - '.github/workflows/reusable-*.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: engine-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup-toolchain:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]
        compiler: [gcc, clang]
    uses: ./.github/workflows/reusable-setup-toolchain.yml
    with:
      os: ${{ matrix.os }}
      compiler: ${{ matrix.compiler }}

  build-make:
    needs: setup-toolchain
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]
        compiler: [gcc, clang]
    uses: ./.github/workflows/reusable-build-make.yml
    with:
      os: ${{ matrix.os }}
      compiler: ${{ matrix.compiler }}

  build-cmake:
    needs: setup-toolchain
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]
        compiler: [gcc, clang]
    uses: ./.github/workflows/reusable-build-cmake.yml
    with:
      os: ${{ matrix.os }}
      compiler: ${{ matrix.compiler }}

  selftests:
    needs: [build-make, build-cmake]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]
        compiler: [gcc, clang]
    uses: ./.github/workflows/reusable-selftests.yml
    with:
      os: ${{ matrix.os }}
      compiler: ${{ matrix.compiler }}

  upload-canonical-summary:
    needs: selftests
    if: always()
    uses: ./.github/workflows/reusable-upload-artifacts.yml
    with:
      name: engine-ci-canonical-summary
      path: |
        bench/results/summary.json
        bench/results/release-gate.log
        bench/results/make-selftest.log
        reports/bitomega_summary.md

  engine-selftest-arm64:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential cmake make ninja-build pkg-config python3 graphviz ripgrep

      - name: Build engine (Make)
        run: make clean && make -j"$(nproc)"

      - name: Run canonical selftest gate (Make)
        run: |
          set -euo pipefail
          mkdir -p bench/results
          make run-selftest 2>&1 | tee bench/results/selftest-host-arm64.log
