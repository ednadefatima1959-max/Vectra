name: model-s-rebuild

on:
  push:
    paths:
      - 'src/**'
      - 'include/**'
      - 'asm/**'
      - 'Makefile'
      - '.github/workflows/model-s-rebuild.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'include/**'
      - 'asm/**'
      - 'Makefile'
      - '.github/workflows/model-s-rebuild.yml'

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build model S
        run: make model-s

      - name: Run deterministic check
        run: |
          out1="$(make run-model-s)"
          out2="$(make run-model-s)"
          test "$out1" = "$out2"
          printf '%s\n' "$out1"
