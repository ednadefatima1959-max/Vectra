name: Reusable Setup Toolchain

on:
  workflow_call:
    inputs:
      os:
        required: false
        type: string
        default: ubuntu-latest
      compiler:
        required: false
        type: string
        default: gcc

permissions:
  contents: read

jobs:
  setup-toolchain:
    runs-on: ${{ inputs.os }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential cmake make ninja-build pkg-config graphviz python3 ccache clang ripgrep

      - name: Validate native toolchain dependencies
        run: |
          set -euo pipefail
          required_tools=(cc gcc as ld ar nm make cmake ninja python3 dot rg ccache)
          for tool in "${required_tools[@]}"; do
            command -v "$tool" >/dev/null 2>&1 || { echo "Missing required tool: $tool"; exit 1; }
            echo "OK: $tool -> $(command -v "$tool")"
          done

      - name: Validate compiler selection
        run: |
          set -euo pipefail
          case "${{ inputs.compiler }}" in
            gcc|clang) ;;
            *) echo "Unsupported compiler: ${{ inputs.compiler }}" >&2; exit 1 ;;
          esac
