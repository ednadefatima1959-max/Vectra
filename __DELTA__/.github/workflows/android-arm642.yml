# HOTFIX: BUG7 — compila librmr.a antes do link final do demo ARM64
# Autor: ∆RafaelVerboΩ | Data: 2026-04-01
# Arquivo: .github/workflows/android-arm642.yml
# Verificado contra: engine/rmr/sources.cmake, demo_cli/src/main.c
name: android-arm642

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: sudo apt-get update && sudo apt-get install -y unzip wget python3

      - run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          mv android-ndk-r25c ndk

      - name: Build librmr.a and app_arm64
        shell: bash
        run: |
          set -euo pipefail
          CC="$PWD/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang"
          AR="$PWD/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          mkdir -p build_arm64/obj

          python3 - <<'PY'
          import re, pathlib
          text = pathlib.Path('engine/rmr/sources_rmr_core.cmake').read_text(encoding='utf-8')
          def extract(name):
            m = re.search(rf"set\({name}\s*(.*?)\)", text, re.S)
            if not m:
              return []
            vals = []
            for ln in m.group(1).splitlines():
              ln = ln.strip()
              if ln and not ln.startswith('#'):
                vals.append(ln)
            return vals
          core = extract('RMR_SOURCE_GROUP_CORE')
          policy = extract('RMR_SOURCE_GROUP_OPTIONAL_POLICY')
          pathlib.Path('build_arm64/core.list').write_text('\n'.join(core + policy) + '\n', encoding='utf-8')
          PY

          while IFS= read -r src; do
            [[ -n "$src" ]] || continue
            obj="build_arm64/obj/${src//\//_}.o"
            "$CC" -Iengine/rmr/include -O2 -fPIC -DRMR_JNI_BUILD=1 -c "$src" -o "$obj"
          done < build_arm64/core.list

          "$CC" -Iengine/rmr/include -O2 -fPIC -DRMR_JNI_BUILD=1 -c engine/rmr/src/bitraf.c -o build_arm64/obj/bitraf.o
          "$AR" rcs build_arm64/librmr.a build_arm64/obj/*.o

          "$CC" -Iengine/rmr/include -O2 -fPIE -pie demo_cli/src/main.c build_arm64/librmr.a -lm -o app_arm64

      - run: file app_arm64

      - uses: actions/upload-artifact@v4
        with:
          name: app_arm64
          path: |
            app_arm64
            build_arm64/librmr.a
