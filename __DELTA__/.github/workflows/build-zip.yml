name: Build Vectra ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Java (Gradle)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Clean project
      run: ./gradlew clean || true

    - name: Remove unnecessary files
      run: |
        rm -rf .git
        rm -rf .gradle
        rm -rf build
        find . -name "*.log" -delete || true
        find . -name "*.tmp" -delete || true

    - name: Create ZIP
      run: zip -r vectra_release.zip . -x "*.git*" "*build*" "*.gradle*"

    - name: Upload ZIP
      uses: actions/upload-artifact@v4
      with:
        name: vectra-release
        path: vectra_release.zip
