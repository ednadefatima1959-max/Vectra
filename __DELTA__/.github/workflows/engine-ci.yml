# HOTFIX: TAREFA C/H — gate de manifesto + invariantes Q16.16
# Autor: ∆RafaelVerboΩ | Data: 2026-04-01
# Arquivo: .github/workflows/engine-ci.yml
# Verificado contra: Makefile, engine/rmr/include/rafaelia_formulas_core.h
name: Engine CI

on:
  push:
    paths:
      - 'engine/**'
      - 'demo_cli/**'
      - 'CMakeLists.txt'
      - 'Makefile'
      - 'engine/rmr/sources.cmake'
      - 'engine/rmr/sources.mk'
      - 'tools/sync_engine_sources.py'
      - '.github/workflows/engine-ci.yml'
      - '.github/workflows/reusable-*.yml'
  pull_request:
    paths:
      - 'engine/**'
      - 'demo_cli/**'
      - 'CMakeLists.txt'
      - 'Makefile'
      - 'engine/rmr/sources.cmake'
      - 'engine/rmr/sources.mk'
      - 'tools/sync_engine_sources.py'
      - '.github/workflows/engine-ci.yml'
      - '.github/workflows/reusable-*.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: engine-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  minimal-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential cmake make ninja-build pkg-config python3 ripgrep

      - name: Check engine source manifest alignment
        run: make check-engine-source-manifest

      - name: Validate Q16 invariants
        run: |
          set -euo pipefail
          grep -E "SPIRAL_Q16|PI_SIN_279_Q16|ALPHA_Q16" engine/rmr/include/rafaelia_formulas_core.h             | awk '{print $3}' | sort > /tmp/invariants.current
          diff -u tools/invariant_golden.txt /tmp/invariants.current

      - name: Configure + build CMake minimal profile
        run: |
          cmake -S . -B build-cmake-minimal -G Ninja -DRMR_PROFILE=minimal
          cmake --build build-cmake-minimal -j"$(nproc)"
          cmake --build build-cmake-minimal --target verify_contracts

      - name: Assert QA-only targets are absent in minimal profile
        run: |
          set -euo pipefail
          if ninja -C build-cmake-minimal -t targets all | rg -n "run_selftest|bitomega_transition_graph|run_release_gate|rmr_bench"; then
            echo "QA-only targets found in minimal profile." >&2
            exit 1
          fi
          echo "OK: minimal profile excludes benchmark/selftest/graph targets."

  qa-full:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]
        compiler: [gcc, clang]
    uses: ./.github/workflows/reusable-selftests.yml
    with:
      os: ${{ matrix.os }}
      compiler: ${{ matrix.compiler }}
      cmake_profile: qa

  approval-gate:
    name: approval-gate
    runs-on: ubuntu-latest
    needs: [minimal-fast, qa-full]
    if: always()
    steps:
      - name: Enforce approval criteria
        run: |
          echo "Approval criteria:"
          echo "1) minimal-fast must pass (runtime-only CMake profile)."
          echo "2) qa-full matrix must pass (full selftests/benchmark/graph path)."
          [[ "${{ needs.minimal-fast.result }}" == "success" ]]
          [[ "${{ needs.qa-full.result }}" == "success" ]]

  engine-selftest-arm64:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential cmake make ninja-build pkg-config python3 graphviz ripgrep

      - name: Build engine (Make)
        run: make clean && make -j"$(nproc)"

      - name: Run canonical selftest gate (Make)
        run: |
          set -euo pipefail
          mkdir -p bench/results
          make run-selftest 2>&1 | tee bench/results/selftest-host-arm64.log
