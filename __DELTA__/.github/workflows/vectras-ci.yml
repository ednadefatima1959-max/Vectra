name: vectras-ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  maia-integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validação de Integridade MaiaSuprema
        shell: bash
        run: |
          set -euo pipefail
          target="./generated_output/ir_hex.asm"
          script="scripts/v_integrity_check.py"
          if [[ ! -f "$script" ]]; then
            echo "[skip] script ausente: $script"
            exit 0
          fi
          if [[ ! -f "$target" ]]; then
            echo "[skip] artefato ausente: $target"
            exit 0
          fi
          python3 "$script" "$target"
